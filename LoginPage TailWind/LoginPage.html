<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-[url(./images/background-purple.jpg)] bg-cover">
     <div id="error-msg-notification" class="fixed top-4 p-3 right-4 bg-gray-100 rounded-lg shadow-lg z-50 hidden">
        <p id="error-msg-text" class="text-amber-500">Error Message: </p>
    </div>
    <div class="max-w-md w-full bg-white/20 p-8 rounded-2xl shadow-lg backdrop-blur border border-white/30">
        <h1 class="text-2xl md:text-4xl font-bold text-white text-center mb-8">Login</h1>
        <form id = "login-form" class="space-y-4">
            <input type="text" placeholder="Username" id="username" name="username" class="placeholder-white/60 text-white border border-white/30 p-3 rounded-full w-full hover:bg-pink-300 focus:outline-none focus:ring-pink-400 focus:ring-1">
            <div class="flex items-center  p-3 text-white border border-white/30 rounded-full w-full hover:bg-pink-300 focus-within:ring-pink-400 focus-within:ring-1">
                <input type="password" placeholder="Password" id="password" name="password" class="placeholder-white/60 focus:outline-none grow">
                <button type="button" id="eye-toggle">
                    <svg xmlns="http://www.w3.org/2000/svg" id="eye-close" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"  class="cursor-pointer size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                    </svg>
                    <svg xmlns="http://www.w3.org/2000/svg" id="eye-open" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="hidden cursor-pointer size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                </button>
            </div>
            <div class="flex flex-col space-y-2 md:flex-row md:justify-between">
                <div class="flex items-center gap-2">
                    <input type="checkbox"> 
                    <label class="text-white ">Remember me</label>
                </div>
                <p class="text-white hover:underline" ><a href="Forgot.html"> Forgot password?</a></p>
            </div>
            <button type="submit" class=" cursor-pointer border border-white/30 bg-gray-100 p-3 font-bold rounded-full w-full transition delay-150 duration-300 ease-in-out hover:-translate-y-1 hover:scale-100 hover:bg-pink-400">Login</button>
            <p class="text-white text-center">Don't have an account? <a href="Register.html" class="font-bold hover:underline">Register</a></p>
        </form>
    </div> 
    <script>
        function eyetoggle(){
            const button = document.getElementById("eye-toggle");
            button.addEventListener ("click", function(){
            const password = document.getElementById("password");
            if(password.type === "password"){
                password.type = "text";
            }else{
                password.type = "password";
            }
            document.getElementById("eye-close").classList.toggle("hidden");
            document.getElementById("eye-open").classList.toggle("hidden");
            });
        };
        eyetoggle();

        function validation(){
            const form = document.getElementById("login-form");
            const notification = document.getElementById("error-msg-notification");
            const username = document.getElementById("username");
            const password = document.getElementById("password");
            const msg = document.getElementById("error-msg-text");
            form.addEventListener("submit", function(e){
            e.preventDefault()
            notification.classList.add("hidden")
            if(username.value === ""){
                notification.classList.remove("hidden")
                msg.textContent = "Error Message: Username cannot be empty!"
                return
            } 
            if(password.value === ""){
                notification.classList.remove("hidden")
                msg.textContent = "Error Message: Password cannot be empty!"
                return                
            }

            const usernameValue = username.value.trim();
            const passwordValue = password.value.trim();

            const users = JSON.parse(localStorage.getItem("users")) || [];
            
            let UserExist = false;
            function findUser(users){
                for(let i = 0; i< users.length ; i++){
                if(users[i].username === usernameValue && users[i].password === passwordValue)                    
                    return true;
                }
                return false;
            }
            UserExist = findUser(users)
            
            if(UserExist === true){
                localStorage.setItem("currentUser", usernameValue);
                window.location.href = "Home.html"
                return
            }else{
                notification.classList.remove("hidden");
                msg.textContent = "Error Message: Invalid Username or Password!";
            }
            });
        }
        validation();
    </script>
</body>
</html>
